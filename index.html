<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>仙途·无尽深渊 v1.1</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="css/style.css?v=20260527invfix1">
</head>
<body>
<div id="game-container">
  <canvas id="game-canvas"></canvas>
  <div id="map-layer-container">
    <div id="map-layer"></div>
  </div>
  <div id="death-dom-screen"></div>
  <div id="hud-overlay">
    <div id="hud-top">
      <span id="hud-realm">境界: 炼气期</span>
      <span id="hud-spirit-stones">💎 灵石: 0</span>
    </div>
    <div id="hud-next-step">点击「副本」选择青云山</div>
    <button id="hud-artifact" class="empty" type="button" aria-label="打开神器面板">
      <div class="artifact-icon-wrap">
        <span class="artifact-icon">🗡️</span>
        <span class="artifact-level-badge rarity-corner">-</span>
      </div>
      <span class="artifact-name">未激活神器</span>
    </button>
    <div id="hud-bottom">
      <span id="hud-floor">深渊第 1 层</span>
        <span id="hud-biome">❄️ 雪原</span>
      <div id="hud-stats">
        <div class="stat-bar"><span class="stat-label">生命</span><div class="bar-bg"><div id="hp-fill" class="bar-fill hp"></div></div><span id="hp-text">100/100</span></div>
        <div class="stat-bar"><span class="stat-label">灵力</span><div class="bar-bg"><div id="mp-fill" class="bar-fill mp"></div></div><span id="mp-text">50/50</span></div>
        <div class="stat-bar"><span class="stat-label">经验</span><div class="bar-bg"><div id="xp-fill" class="bar-fill xp"></div></div><span id="xp-text">0/100</span></div>
      </div>
      <div id="hud-next-step">下一步：点击「副本」选择青云山</div>
    </div>
  </div>
  <div id="message-log"></div>
  <div id="menu-bar">
    <button class="menu-btn" id="btn-bag">🎒背包</button>
    <button class="menu-btn primary" id="btn-character">👤角色</button>
    <button class="menu-btn" id="btn-stages">🗺️副本</button>
    <button class="menu-btn more" id="btn-more">☰更多</button>
  </div>
  <div id="more-menu" aria-hidden="true" inert>
    <button class="more-menu-btn" id="btn-skills">📜 技能</button>
    <button class="more-menu-btn" id="btn-artifact">🗡️ 神器</button>
    <button class="more-menu-btn" id="btn-secret-realm">🏞️ 秘境</button>
    <button class="more-menu-btn" id="btn-tribulation">⚡ 天劫</button>
    <button class="more-menu-btn" id="btn-ascension">☁️ 飞升</button>
    <button class="more-menu-btn" id="btn-alchemy">🔥 炼丹</button>
    <button class="more-menu-btn" id="btn-break">⚡ 突破</button>
    <button class="more-menu-btn" id="btn-save">💾 保存</button>
  </div>
  <div id="touch-controls">
    <div id="joystick-zone">
      <div id="joystick-base">
        <div id="joystick-thumb"></div>
      </div>
    </div>
    <div id="action-buttons">
      <button class="act-btn stage-quick-btn" id="btn-stage-quick-clear">⚡速战</button>
      <button class="act-btn stage-exit-btn" id="btn-stage-exit">🚪退出</button>
      <button class="act-btn secret-quick-btn" id="btn-secret-quick-challenge">⚡速挑</button>
      <button class="act-btn secret-exit-btn" id="btn-secret-exit">🚪离境</button>
      <button class="act-btn" id="btn-attack">⚔️攻击</button>
      <button class="act-btn" id="btn-defend">🛡️防御</button>
      <button class="act-btn" id="btn-flee">🏃逃跑</button>
    </div>
  </div>
</div>
<script src="js/debug.js?v=20260527invfix1"></script>
<script src="js/dungeon.js?v=20260527invfix1"></script>
<script src="js/stages.js?v=20260527invfix1"></script>
<script src="js/entities.js?v=20260527invfix1"></script>
<script src="js/combat.js?v=20260527invfix1"></script>
<script src="js/loot.js?v=20260527invfix1"></script>
<script src="js/artifacts.js?v=20260527invfix1"></script>
<script src="js/skills.js?v=20260527invfix1"></script>
<script src="js/alchemy.js?v=20260527invfix1"></script>
<script src="js/ascension.js?v=20260527invfix1"></script>
<script src="js/particles.js?v=20260527invfix1"></script>
<script src="js/ui.js?v=20260527invfix1"></script>
<script src="js/save.js?v=20260527invfix1"></script>
<script src="js/secretRealms.js?v=20260527invfix1"></script>
<script src="js/tribulation.js?v=20260527invfix1"></script>
<script src="js/main.js?v=20260527invfix1"></script>
</body>
</html>
